name: Build and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0)'
        required: false

jobs:
  build:
    name: Build JAR
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Build with Maven
        run: mvn -B -DskipTests clean package

      - name: Get project version
        id: get_version
        run: |
          VERSION=$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive org.codehaus.mojo:exec-maven-plugin:3.1.0:exec)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: target/*.jar

  package-windows:
    name: Package Windows installer (jpackage)
    runs-on: windows-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Download JAR from build
        uses: actions/download-artifact@v4
        with:
          name: jar

      - name: Build and collect JavaFX dependencies
        run: |
          mvn -B -DskipTests dependency:copy-dependencies -DincludeGroupIds=org.openjfx -DoutputDirectory=javafx-deps || true

      - name: Prepare jpackage input
        run: |
          mkdir input
          for f in target/*.jar; do cp "$f" input/; done
          mkdir javafx-deps || true
          for f in javafx-deps/*.jar; do cp "$f" javafx-deps/ || true; done

      - name: Run jpackage (Windows)
        shell: pwsh
        run: |
          $exeOutput = 'installer-out'
          mkdir $exeOutput
          jpackage --input input --main-jar MineSweeper-1.0-SNAPSHOT.jar --main-class com.minesweeper.Main --type exe --name MineSweeper --module-path javafx-deps --add-modules javafx.controls,javafx.fxml --dest $exeOutput

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: installer-out/*

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, package-windows]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: jar
      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: installer

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="v${{ needs.build.outputs.version }}"
          fi
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and upload artifacts
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.TAG }}
          name: ${{ steps.tag.outputs.TAG }}
          files: |
            *.jar
            installer-out/*
